# Type Generation Config
type:
  # Limits for literal types (for performance and readability)
  maxLiteralValues: 5000              # Max unique values for primitive literals
  maxArrayLiteralItems: 5000          # Max unique items for array literals
  
  # Union type splitting
  splitLargeTypes: true               # Split large union types into segments
  itemsPerSegment: 50                 # How many items per segment
  minItemsForSplit: 20                # Minimum items before considering split
  
  # Named type generation thresholds
  minLanguagesForNamedType: 0         # Min languages using a field to generate named type
  minUsagePercent: 0                  # Min percentage of languages using field
  
  # Debug output
  showFieldStats: true
  showExamples: 3
  
  # Type generation strategy
  allowFlexibleTypes: false            # Add (string & {}) for extensibility
  useReadonlyArrays: true             # Generate readonly array types

  #
  secondary:
    enabled: true
    allowFlexibleTypes: true
    useReadonlyArrays: true

  #
  paths:
    outputDir: "src/generated/types"
  
  #
  aliases:
    outputDir: "@/generated/types"

  #
  out:
    fileName: "language-types.generated.ts"
    fileNameNoExt: "language-types.generated"

  naming:
    language: "Language"
    languageName: "LanguageName"
    secondaryPrefix: "Flex"
    fields:
      - field: "name"
        type: "LanguageName"

